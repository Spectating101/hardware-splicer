name: Diagnose core patch fragments

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-core-patch.yml

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/evidence-first-integration-stack
      - name: Count guarded fragments
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          checks = [
              ('fan resolver', 'src/hardware_splicer/module_resolver.py', '(re.compile(r"fan|blower", re.I), "fan-5v", "load", 0.8),'),
              ('fan regression', 'tests/test_module_resolver_regression.py', '("cooling fan 5v", "fan", "fan-5v"),'),
              ('python button picker', 'src/hardware_splicer/module_picker.py', '        requires_any=[["switch_or_button"]],\n        priority=5,'),
              ('typescript button picker', 'apps/circuit-ai/circuit-ai-frontend/lib/jarvis/build-module-picker.ts', '    requiresAny: [["switch_or_button"]],\n    priority: 5,'),
              ('support module list', 'src/hardware_splicer/inventory_topology.py', '        "tp4056",\n    }'),
              ('mcu alias return', 'src/hardware_splicer/inventory_topology.py', '        for src, dst in zip(("D2", "D3", "D4", "D5", "D6", "D7"), gpio_pool):\n            aliases[src] = dst\n    return aliases'),
              ('usb support early return', 'src/hardware_splicer/inventory_topology.py', '    """Keep power/support modules that make a pruned salvage recipe electrically valid."""\n    if topology == "usb_5v":\n        return set()\n\n    modules = list(recipe.get("modules") or [])'),
              ('dht fallback', 'src/hardware_splicer/inventory_topology.py', '    sns_id = str(overrides.get("sns") or _module_id_for(list(recipe.get("modules") or []), "sns") or "")'),
              ('agent ordering', 'tests/test_agent_sdk.py', '    assert ids == ["esp32-devkit", "dht22", "usb-power-5v"]'),
              ('golden authority', 'tests/test_golden_loop.py', '    assert report["bench_after"].get("power_on_authorized") is True\n    assert report.get("passed") is True'),
              ('bench structural authority', 'tests/test_splice_bench.py', '    updated = submit_bench_measurements(out, measurements)\n    assert updated["critical_open_count"] == 0\n    assert updated["power_on_authorized"] is True'),
              ('info diagnostic', 'tests/test_topology_operator_lowering.py', '    assert result["compose_result"]["design_quality"]["electrical_issues"] == []'),
          ]
          result = []
          for label, path, fragment in checks:
              text = Path(path).read_text(encoding='utf-8')
              result.append({'label': label, 'path': path, 'count': text.count(fragment), 'fragment': fragment})
          manifest = json.loads(Path('examples/intakes/golden_compile_manifest.json').read_text(encoding='utf-8'))
          scratch = next(row for row in manifest['cases'] if row['id'] == 'scratch_compose')
          result.append({'label': 'scratch baseline', 'count': 1 if scratch.get('expected_build_id') == 'generic_low_voltage_build' else 0, 'value': scratch.get('expected_build_id')})
          Path('/tmp/core-patch-counts.json').write_text(json.dumps(result, indent=2), encoding='utf-8')
          print(json.dumps(result, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: core-patch-counts
          path: /tmp/core-patch-counts.json
