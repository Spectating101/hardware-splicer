name: Hardware-Splicer

on:
  push:
    paths:
      - "src/hardware_splicer/**"
      - "scripts/**"
      - "tests/**"
      - "examples/intakes/**"
      - "apps/circuit-ai/circuit-ai-frontend/lib/**"
      - "apps/circuit-ai/tests/**"
      - "Makefile"
      - "requirements.txt"
      - ".github/workflows/hardware-splicer.yml"
  pull_request:
    paths:
      - "src/hardware_splicer/**"
      - "scripts/**"
      - "tests/**"
      - "examples/intakes/**"
      - "apps/circuit-ai/circuit-ai-frontend/lib/**"
      - "apps/circuit-ai/tests/**"
      - "Makefile"
      - "requirements.txt"
      - ".github/workflows/hardware-splicer.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install KiCad CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y kicad
      - name: Bootstrap (venv, npm, 3D-Splicer)
        run: make setup
      - name: Core verify (tests, benchmark, audit, tiers, smoke)
        env:
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
        run: |
          source .venv/bin/activate
          make verify
      - name: Exploration harness
        env:
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
        run: |
          source .venv/bin/activate
          make explore

  apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bootstrap
        run: make setup
      - name: App test suites (circuit-ai, mecha, 3d)
        run: |
          source .venv/bin/activate
          make test-apps
