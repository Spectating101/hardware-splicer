      - "tests/**"
      - "examples/netlist_fixtures/**"
      - "examples/geometry_snapshots/**"
      - "examples/splice/**"
      - "examples/fixtures/**"
      - "examples/intakes/splice_*"
      - "apps/circuit-ai/circuit-ai-frontend/lib/**"
      - "apps/circuit-ai/tests/**"
      - "apps/splice-ui/**"
      - "deploy/**"
      - "pyproject.toml"
      - "requirements-splice-v1.txt"
      - "docs/QUICKSTART_SPLICE_v1.md"
      - "docs/SUPPORT_AND_LIABILITY_v1.md"
      - "docs/OPERATIONS_RUNBOOK_v1.md"
      - "docs/DEMO_5_MIN_UI.md"
      - "docs/INSTALL_REPORT_TEMPLATE.md"
      - "docs/OFFER_SPLICE_BENCH_KIT_v1.md"
      - "docs/README_MONOREPO_DEPTH.md"
      - "docs/DOCUMENTATION_INDEX.md"
      - "docs/RELEASE_V1.md"
      - "CHANGELOG.md"
      - "RELEASE_NOTES_v1.0.1.md"
      - "RELEASE_NOTES_v1.0.md"
      - "README.md"
      - "docs/GITHUB_START_HERE.md"
      - "docs/INTERNAL_MATURITY_PLAN.md"
      - "tests/test_splice_product_v1.py"
      - "scripts/verify_install_smoke.sh"
      - "scripts/verify_product_live_smoke.py"
      - "docs/EXTERNAL_PROOF_CHECKLIST.md"
      - "RELEASE_NOTES_v1.0.2.md"
      - "releases/**"
      - "Makefile"
      - "requirements.txt"
      - ".github/workflows/hardware-splicer.yml"
  pull_request:
    paths:
      - "src/hardware_splicer/**"
      - "scripts/**"
      - "tests/**"
      - "examples/netlist_fixtures/**"
      - "examples/geometry_snapshots/**"
      - "examples/splice/**"
      - "examples/fixtures/**"
      - "examples/intakes/splice_*"
      - "apps/circuit-ai/circuit-ai-frontend/lib/**"
      - "apps/circuit-ai/tests/**"
      - "apps/splice-ui/**"
      - "deploy/**"
      - "pyproject.toml"
      - "requirements-splice-v1.txt"
      - "docs/QUICKSTART_SPLICE_v1.md"
      - "docs/SUPPORT_AND_LIABILITY_v1.md"
      - "docs/OPERATIONS_RUNBOOK_v1.md"
      - "docs/DEMO_5_MIN_UI.md"
      - "docs/INSTALL_REPORT_TEMPLATE.md"
      - "docs/OFFER_SPLICE_BENCH_KIT_v1.md"
      - "docs/README_MONOREPO_DEPTH.md"
      - "docs/DOCUMENTATION_INDEX.md"
      - "docs/RELEASE_V1.md"
      - "CHANGELOG.md"
      - "RELEASE_NOTES_v1.0.1.md"
      - "RELEASE_NOTES_v1.0.md"
      - "README.md"
      - "docs/GITHUB_START_HERE.md"
      - "docs/INTERNAL_MATURITY_PLAN.md"
      - "tests/test_splice_product_v1.py"
      - "scripts/verify_install_smoke.sh"
      - "scripts/verify_product_live_smoke.py"
      - "docs/EXTERNAL_PROOF_CHECKLIST.md"
      - "RELEASE_NOTES_v1.0.2.md"
      - "releases/**"
      - "Makefile"
      - "requirements.txt"
      - ".github/workflows/hardware-splicer.yml"

jobs:
  splice-v1:
    name: Splice Agent v1 bar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install KiCad 9 CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install --install-recommends -y kicad
          KICAD_VERSION="$(kicad-cli --version)"
          echo "KiCad CLI: ${KICAD_VERSION}"
          case "${KICAD_VERSION}" in
            9.*) ;;
            *) echo "Expected KiCad 9.x, got ${KICAD_VERSION}" >&2; exit 1 ;;
          esac
          kicad-cli pcb drc --help | grep -q -- "--format"
          kicad-cli sch erc --help | grep -q -- "--format"
      - name: Splice v1 slim install (with dev for pytest)
        run: INSTALL_DEV=1 bash scripts/install_splice_v1.sh
      - name: Doctor
        run: |
          source .venv/bin/activate
          make doctor
      - name: Project package bridge tests
        run: |
          source .venv/bin/activate
          make test-project-package
      - name: Splice demo verification
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_DRC_FIX_LOOP: "1"
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
          HARDWARE_SPLICER_OFFLINE_SALVAGE: "1"
        run: |
          source .venv/bin/activate
          make verify-splice
      - name: Splice golden loop verification
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_DRC_FIX_LOOP: "1"
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
          HARDWARE_SPLICER_OFFLINE_SALVAGE: "1"
        run: |
          source .venv/bin/activate
          make verify-splice-loop
      - name: Upload golden-loop report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: splice-golden-loop-report
          path: /tmp/hs_splice_golden_verify/SPLICE_GOLDEN_LOOP_VERIFY.json
          if-no-files-found: warn
      - name: Splice real-bench verification
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_DRC_FIX_LOOP: "1"
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
          HARDWARE_SPLICER_OFFLINE_SALVAGE: "1"
        run: |
          source .venv/bin/activate
          make verify-splice-real-bench
      - name: Upload golden real-bench report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: splice-golden-real-report
          path: |
            /tmp/hs_splice_golden_real_verify/SPLICE_GOLDEN_REAL_REPORT.json
            /tmp/hs_splice_golden_real_verify/SPLICE_GOLDEN_REAL_VERIFY.json
          if-no-files-found: warn
      - name: Evidence integration focused tests
        if: ${{ !cancelled() }}
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest -q tests/test_integration_stack.py tests/test_evidence_salvage_bridge.py tests/test_evidence_bench_gates.py tests/test_golden_real_bench.py tests/test_kicad_cli_drc_unit.py
      - name: splice-ui production build
        if: ${{ !cancelled() }}
        run: make splice-ui-build
      - name: product v1 API tests
        if: ${{ !cancelled() }}
        run: |
          source .venv/bin/activate
          make test-splice-product-v1
      - name: v1.1 security and interface API tests
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_ALLOW_ARBITRARY_OUT_DIR: "1"
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest tests/test_build_files_security.py tests/test_oss_integrations_api.py tests/test_build_files_api.py -q
      - name: verify-product-live-smoke
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_ALLOW_ARBITRARY_OUT_DIR: "1"
        run: |
          source .venv/bin/activate
          make verify-product-live-smoke

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install KiCad 9 CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install --install-recommends -y kicad
          KICAD_VERSION="$(kicad-cli --version)"
          echo "KiCad CLI: ${KICAD_VERSION}"
          case "${KICAD_VERSION}" in
            9.*) ;;
            *) echo "Expected KiCad 9.x, got ${KICAD_VERSION}" >&2; exit 1 ;;
          esac
          kicad-cli pcb drc --help | grep -q -- "--format"
          kicad-cli sch erc --help | grep -q -- "--format"
      - name: Bootstrap (venv, npm, 3D-Splicer)
        run: make setup
      - name: Engine verify (KiCad DRC bar, no FreeRouting)
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_JLC_ENRICH: "0"
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python scripts/verify_engine.py --json /tmp/verify-engine.json
      - name: Upload engine verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-engine-report
          path: /tmp/verify-engine.json
          if-no-files-found: warn
      - name: Fab verify (Gerber + inspect-fab)
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_JLC_ENRICH: "0"
          CI: "1"
        run: |
          source .venv/bin/activate
          make verify-fab
      - name: Netlist engine verify
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_JLC_ENRICH: "0"
        run: |
          source .venv/bin/activate
          make verify-netlist-engine
      - name: Tier C verify
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_JLC_ENRICH: "0"
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
        run: |
          source .venv/bin/activate
          set -o pipefail
          make verify-tier-c 2>&1 | tee /tmp/verify-tier-c.log
      - name: Geometry snapshot verify
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_AUTOROUTE: "0"
          HARDWARE_SPLICER_JLC_ENRICH: "0"
        run: |
          source .venv/bin/activate
          set -o pipefail
          PYTHONPATH=src python scripts/verify_geometry.py --out /tmp/hs_verify_geometry --json /tmp/verify-geometry.json 2>&1 | tee /tmp/verify-geometry.log
      - name: Sprint C integration tests
        if: ${{ !cancelled() }}
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python -m pytest tests/test_sprint_c.py tests/test_compose_jobs.py tests/test_compose_dispatch.py tests/test_compose_failure.py -q
      - name: Compile casefile gate
        if: ${{ !cancelled() }}
        run: |
          source .venv/bin/activate
          make verify-casefiles
      - name: Core verify (tests, benchmark, audit, tiers, smoke)
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
        run: |
          source .venv/bin/activate
          set -o pipefail
          make verify 2>&1 | tee /tmp/verify-core.log
      - name: Exploration harness
        if: ${{ !cancelled() }}
        env:
          HARDWARE_SPLICER_SKIP_VISION_LIVE: "1"
        run: |
          source .venv/bin/activate
          set -o pipefail
          make explore 2>&1 | tee /tmp/exploration.log
      - name: Upload legacy verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-verification-diagnostics
          path: |
            /tmp/verify-tier-c.log
            /tmp/verify-geometry.log
            /tmp/verify-geometry.json
            /tmp/verify-core.log
            /tmp/exploration.log
            /tmp/hardware_splicer/functional_audit/FUNCTIONAL_DELIVERY_AUDIT.json
          if-no-files-found: warn

  apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bootstrap
        run: make setup
      - name: App test suites (circuit-ai, mecha, 3d)
        run: |
          source .venv/bin/activate
          make test-apps
