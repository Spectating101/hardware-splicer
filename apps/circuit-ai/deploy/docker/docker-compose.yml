
version: '3.8'

services:
  circuit-ai-api:
    build: .
    container_name: circuit-ai-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LLM_ENABLED=false
      - DATABASE_URL=sqlite:///./data/circuit_ai.db
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  circuit-ai-ui:
    build: .
    container_name: circuit-ai-ui
    ports:
      - "7860:7860"
    environment:
      - HOST=0.0.0.0
      - PORT=7860
      - LLM_ENABLED=false
      - DATABASE_URL=sqlite:///./data/circuit_ai.db
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["python3", "src/ui/gradio_app.py"]
    restart: unless-stopped
    depends_on:
      - circuit-ai-api

volumes:
  data:
  models:
