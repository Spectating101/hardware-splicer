name: ci
on: [push, pull_request]
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t 3d-splicer .
      - name: Run
        run: docker run -d --rm -p 8000:8000 --name splicer 3d-splicer
      - name: Wait for boot
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
      - name: Health (geom)
        run: curl -sf http://127.0.0.1:8000/health/geom
      - name: Minimal case
        run: |
          curl -s -X POST http://127.0.0.1:8000/v1/splice \
            -H "Content-Type: application/json" \
            --data @examples/min_case.json
